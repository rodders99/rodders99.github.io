text: "Thank you for contacting me with the opportunity to become one of your 'Hot influencers' on tiktok. While I find the idea of becoming a TikTok influencer for you quite exciting, I'm rather busy at the moment solving world hunger, making 5G chips to inject into everyone and ridding the world of disease. Should my circumstances change in the near future, I will be sure to look you up. Best Regards Bill"
name: "Bill Gates"
position: "Former CEO, Microsoft"
